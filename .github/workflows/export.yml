name: Export Modpack
on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Packwiz
        run: |
          wget -O packwiz.zip "https://nightly.link/packwiz/packwiz/workflows/go/main/Linux%2064-bit%20x86.zip"
          unzip -o packwiz.zip
          chmod +x packwiz
      - name: Export pack
        run: ./packwiz mmc export -o NotVanilla.zip
      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          files: NotVanilla.zip
          tag_name: latest
          name: Latest Release
          body: "Autogenerated latest release by GitHub Actions."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
