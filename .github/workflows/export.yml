name: Export Modpack
on:
  push:
    branches:
      - main
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Create Prism Pack
        run: |
          # Structure the zip for Prism Launcher correctly:
          # instance.cfg and mmc-pack.json go to the root of the ZIP
          # packwiz-installer-bootstrap.jar MUST go inside the minecraft/ folder
          # so the Pre-Launch command can find it in the working directory.
          mkdir minecraft
          cp packwiz-installer-bootstrap.jar minecraft/
          zip -r NotVanilla.zip instance.cfg mmc-pack.json minecraft/packwiz-installer-bootstrap.jar
      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          files: NotVanilla.zip
          tag_name: latest
          name: Latest Release
          body: "Autogenerated latest release by GitHub Actions."
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}