name: Export Modpack
on:
  push:
    branches:
      - main
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Create Prism Pack
        run: |
          # Use zip directly without modifying index.toml in the workflow
          # This keeps the index intact as it was in the repository
          zip -r NotVanilla.zip . -i "instance.cfg" "mmc-pack.json" "pack.toml" "index.toml" "packwiz-installer-bootstrap.jar" "mods/*.pw.toml" "CHANGELOG.md" "README.md"
      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          files: NotVanilla.zip
          tag_name: latest
          name: Latest Release
          body: "Autogenerated latest release by GitHub Actions."
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
