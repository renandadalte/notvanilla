name: Publish Prism Bootstraps

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Validate repo state
        run: |
          python3 scripts/check_packwiz_state.py
          python3 scripts/audit_repo_surface.py

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -Eeuo pipefail
          case "${GITHUB_REF_NAME}" in
            main)
              echo "zip_name=NotVanilla.zip" >> "$GITHUB_OUTPUT"
              echo "tag_name=latest" >> "$GITHUB_OUTPUT"
              echo "release_name=Latest Release" >> "$GITHUB_OUTPUT"
              echo "source_cfg=instance.cfg" >> "$GITHUB_OUTPUT"
              echo "include_dev_cfg=false" >> "$GITHUB_OUTPUT"
              printf '%s\n' \
                'body<<BODY' \
                'Bootstrap ZIP da linha de produção. A instância Prism aponta para o canal estável publicado em GitHub Pages.' \
                'BODY' >> "$GITHUB_OUTPUT"
              ;;
            dev)
              echo "zip_name=NotVanilla-dev.zip" >> "$GITHUB_OUTPUT"
              echo "tag_name=dev-latest" >> "$GITHUB_OUTPUT"
              echo "release_name=Dev Latest" >> "$GITHUB_OUTPUT"
              echo "source_cfg=instance.dev.cfg" >> "$GITHUB_OUTPUT"
              echo "include_dev_cfg=true" >> "$GITHUB_OUTPUT"
              printf '%s\n' \
                'body<<BODY' \
                'Bootstrap ZIP da linha de testes. O ZIP inclui `instance.cfg` compatível com Prism e mantém `instance.dev.cfg` para referência.' \
                'BODY' >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported branch: ${GITHUB_REF_NAME}" >&2
              exit 1
              ;;
          esac

      - name: Create Prism bootstrap ZIP
        shell: bash
        run: |
          set -Eeuo pipefail
          rm -rf build
          mkdir -p build/root/minecraft
          cp mmc-pack.json build/root/mmc-pack.json
          cp "${{ steps.meta.outputs.source_cfg }}" build/root/instance.cfg
          if [[ "${{ steps.meta.outputs.include_dev_cfg }}" == "true" ]]; then
            cp instance.dev.cfg build/root/instance.dev.cfg
          fi
          cp packwiz-installer-bootstrap.jar build/root/minecraft/
          (
            cd build/root
            if [[ "${{ steps.meta.outputs.include_dev_cfg }}" == "true" ]]; then
              zip -r "../${{ steps.meta.outputs.zip_name }}" \
                instance.cfg \
                instance.dev.cfg \
                mmc-pack.json \
                minecraft/packwiz-installer-bootstrap.jar
            else
              zip -r "../${{ steps.meta.outputs.zip_name }}" \
                instance.cfg \
                mmc-pack.json \
                minecraft/packwiz-installer-bootstrap.jar
            fi
          )

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: build/${{ steps.meta.outputs.zip_name }}
          tag_name: ${{ steps.meta.outputs.tag_name }}
          name: ${{ steps.meta.outputs.release_name }}
          body: ${{ steps.meta.outputs.body }}
          draft: false
          prerelease: ${{ github.ref_name == 'dev' }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
